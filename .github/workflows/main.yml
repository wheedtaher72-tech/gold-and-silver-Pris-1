name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Capacitor Core & CLI
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Application (Vite dist)
        run: npm run build

      - name: Initialize Capacitor Android Project
        run: |
          npx cap init "البورصة العراقية" "com.iraqigold.app" --web-dir=dist
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK with Gradle (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Iraqi-Gold-Exchange-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
